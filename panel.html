<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09101d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nova Studio">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="app-icon.svg">
  <title>Панель управления • Nova Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <nav class="nav">
        <div class="brand">Nova Studio</div>
        <div class="nav-links">
          <a class="nav-link" href="index.html">Главная</a>
        </div>
        <div class="nav-auth"></div>
        <button class="burger-btn" type="button" aria-label="Открыть меню" aria-expanded="false">☰</button>
        <div class="mobile-menu" aria-label="Мобильное меню">
          <a class="auth-link" href="index.html">Главная</a>
        </div>
      </nav>

      <div style="padding-top: 24px;">
        <section class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab is-active" type="button" data-tab="login">Вход</button>
            <button class="auth-tab" type="button" data-tab="register">Регистрация</button>
          </div>

          <form id="panelLoginForm" class="auth-form">
            <h2>Вход в панель</h2>
            <label class="field">
              <span>Ключ администратора</span>
              <input type="password" name="adminKey" placeholder="Секретный ключ" required>
            </label>
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="you@mail.com" required>
            </label>
            <label class="field">
              <span>Пароль</span>
              <input type="password" name="password" placeholder="Введите пароль" required>
            </label>
            <button class="btn-primary" type="submit">Войти</button>
            <p class="form-message" id="panelLoginMessage"></p>
          </form>

          <form id="panelRegisterForm" class="auth-form is-hidden">
            <h2>Регистрация</h2>
            <label class="field">
              <span>Ключ администратора</span>
              <input type="password" name="adminKey" placeholder="Секретный ключ" required>
            </label>
            <label class="field">
              <span>Имя</span>
              <input type="text" name="name" placeholder="Ваше имя" required>
            </label>
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="you@mail.com" required>
            </label>
            <label class="field">
              <span>Пароль</span>
              <input type="password" name="password" minlength="6" placeholder="Минимум 6 символов" required>
            </label>
            <label class="field">
              <span>Повторите пароль</span>
              <input type="password" name="confirmPassword" minlength="6" placeholder="Повторите пароль" required>
            </label>
            <button class="btn-primary" type="submit">Зарегистрироваться</button>
            <p class="form-message" id="panelRegisterMessage"></p>
          </form>
        </section>

        <section class="auth-card panel-card is-hidden" id="controlPanel">
          <h2>Панель управления сервером</h2>
          <p class="panel-status" id="serverStatus">Статус: проверка...</p>
          <div class="panel-actions">
            <button class="btn-primary" id="startServerBtn" type="button">Включить сервер</button>
            <button class="btn-primary btn-danger" id="stopServerBtn" type="button">Выключить сервер</button>
            <button class="btn-primary btn-muted" id="refreshStatusBtn" type="button">Обновить статус</button>
          </div>
          <p class="form-message" id="panelActionMessage"></p>
        </section>
      </div>
    </header>
  </div>

  <script src="panel.js"></script>
  <script src="pwa.js"></script>
  <script src="enhancements.js"></script>
  <script src="interactions.js"></script>
  <script src="mobile-menu.js"></script>
</body>
</html>
