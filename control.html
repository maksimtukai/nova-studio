<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Control</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230d0d0d'/%3E%3Cpolygon points='8,48 18,20 32,34 46,20 56,48' fill='none' stroke='%2300ff41' stroke-width='3' stroke-linejoin='round'/%3E%3Ccircle cx='8' cy='48' r='4' fill='%2300ff41'/%3E%3Ccircle cx='56' cy='48' r='4' fill='%2300ff41'/%3E%3Ccircle cx='32' cy='18' r='4' fill='%2300ff41'/%3E%3Crect x='8' y='50' width='48' height='6' rx='3' fill='%2300ff41'/%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    #topbar .title { flex:1; text-align:center; color:#444; font-size:11px; letter-spacing:2px; text-transform:uppercase; }

    /* AUTH BAR */
    #auth-bar {
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #auth-bar label { color: #444; font-size: 11px; }
    #auth-bar input {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #00ff41;
      font-family: inherit; font-size: 12px; padding: 3px 8px;
      border-radius: 3px; width: 220px; outline: none;
    }
    #auth-bar input:focus { border-color: #00ff41; }
    .btn {
      background: #0a2a0a; border: 1px solid #00ff41; color: #00ff41;
      font-family: inherit; font-size: 11px; padding: 4px 14px;
      border-radius: 3px; cursor: pointer; letter-spacing: 1px; transition: all .15s;
    }
    .btn:hover { background: #00ff41; color: #0d0d0d; }
    .btn-red    { border-color: #ff4444; color: #ff4444; background: #1a0000; }
    .btn-red:hover { background: #ff4444; color: #0d0d0d; }
    .btn-yellow { border-color: #febc2e; color: #febc2e; background: #1a1200; }
    .btn-yellow:hover { background: #febc2e; color: #0d0d0d; }
    .btn-gray { border-color: #444; color: #444; background: transparent; cursor:default; pointer-events:none; }
    #auth-msg { font-size: 11px; color: #ff4444; margin-left: 4px; }

    /* STATUS ROW */
    #status-row {
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 5px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .stat-block { display:flex; align-items:center; gap:6px; font-size:11px; }
    .stat-label { color: #333; }
    .stat-val   { color: #aaa; }

    .indicator {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; display: inline-block;
    }
    .ind-on  { background: #00ff41; box-shadow: 0 0 6px #00ff41; animation: pulse 2s infinite; }
    .ind-off { background: #ff4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #uptime-val { color: #00ff41; font-variant-numeric: tabular-nums; }

    /* TIMER WIDGET */
    #timer-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0d0d0d;
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 999;
      box-shadow: 0 0 20px rgba(0,255,65,0.08);
      min-width: 130px;
    }
    #timer-widget .tw-label {
      color: #2a5a2a;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #timer-widget .tw-time {
      color: #00ff41;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,255,65,0.4);
    }
    #timer-widget .tw-time.offline {
      color: #2a2a2a;
      text-shadow: none;
    }
    #timer-widget .tw-status {
      font-size: 9px;
      letter-spacing: 1px;
    }
    #timer-widget .tw-status.on  { color: #1a4a1a; }
    #timer-widget .tw-status.off { color: #3a1a1a; }

    /* CONTROL BUTTONS */
    #ctrl-btns { margin-left: auto; display:flex; gap:8px; }

    /* NGROK ROW */
    #ngrok-row {
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 5px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      font-size: 11px;
    }
    #ngrok-url {
      color: #0af; text-decoration: none; font-size: 12px;
      letter-spacing: .5px; flex: 1;
    }
    #ngrok-url:hover { text-decoration: underline; }
    #ngrok-url.offline { color: #333; pointer-events: none; }
    .btn-tiny { padding: 2px 8px; font-size: 10px; }
    .btn-cyan { border-color: #0af; color: #0af; background: #001a22; }
    .btn-cyan:hover { background: #0af; color: #0d0d0d; }

    /* FILTER BAR */
    #filter-bar {
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 4px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      font-size: 11px;
    }
    #filter-bar label { color: #333; }
    #filter-bar input {
      background: #111; border: 1px solid #1a1a1a; color: #aaa;
      font-family: inherit; font-size: 11px; padding: 3px 8px;
      border-radius: 3px; width: 140px; outline: none;
    }
    #filter-bar input:focus { border-color: #00ff41; }
    #stat-total, #stat-uniq { font-size:11px; color:#333; }
    #clear-btn {
      margin-left: auto; background: transparent;
      border: 1px solid #1a1a1a; color: #333;
      font-family: inherit; font-size: 11px;
      padding: 3px 10px; border-radius: 3px; cursor: pointer;
    }
    #clear-btn:hover { border-color:#ff4444; color:#ff4444; }

    /* TERMINAL */
    #terminal {
      flex: 1; overflow-y: auto; padding: 10px 16px;
      display: flex; flex-direction: column; gap: 1px;
    }
    #terminal::-webkit-scrollbar { width: 5px; }
    #terminal::-webkit-scrollbar-track { background: #111; }
    #terminal::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    .entry {
      display: grid;
      grid-template-columns: 150px 115px 38px 1fr;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid #0f0f0f;
      animation: fi .25s ease;
      align-items: baseline;
    }
    @keyframes fi { from{opacity:0;transform:translateX(-4px)} to{opacity:1} }

    .e-time  { color: #444; }
    .e-ip    { color: #0af; }
    .e-status { font-weight:bold; text-align:center; }
    .s-200{color:#00ff41} .s-304{color:#666} .s-404{color:#ff8800}
    .s-403{color:#ff4444} .s-405{color:#ff4444} .s-other{color:#ff0}
    .e-path  { color: #bbb; word-break:break-all; }
    .e-ua    { color: #333; font-size:10px; margin-top:1px; }
    .e-ref   { color: #224; font-size:10px; }

    #empty { color:#222; text-align:center; margin-top:60px; font-size:13px; letter-spacing:2px; }

    /* SYS LOG */
    .sys-msg {
      color: #1a4a1a; font-size:11px; padding:3px 0;
      border-bottom: 1px solid #0f0f0f;
    }
    .sys-msg.err { color:#4a1a1a; }
  </style>
</head>
<body>

<div id="topbar">
  <span class="dot dot-red"></span>
  <span class="dot dot-yellow"></span>
  <span class="dot dot-green"></span>
  <span class="title">nova control terminal</span>
</div>

<div id="auth-bar">
  <label>KEY:</label>
  <input type="password" id="keyInput" placeholder="admin key..." autocomplete="off">
  <button class="btn" onclick="connect()">CONNECT</button>
  <span id="auth-msg"></span>
</div>

<div id="status-row">
  <div class="stat-block">
    <span class="indicator" id="srv-ind"></span>
    <span class="stat-label">сервер:</span>
    <span class="stat-val" id="srv-status">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">uptime:</span>
    <span id="uptime-val">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">total:</span>
    <span class="stat-val" id="stat-total">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">IPs:</span>
    <span class="stat-val" id="stat-uniq">—</span>
  </div>
  <div id="ctrl-btns">
    <button class="btn" id="btn-start" onclick="serverAction('start')">START</button>
    <button class="btn btn-yellow" id="btn-restart" onclick="serverAction('restart')" disabled>RESTART</button>
    <button class="btn btn-red" id="btn-stop" onclick="serverAction('stop')" disabled>STOP</button>
  </div>
</div>

<div id="ngrok-row">
  <span class="stat-label">ngrok:</span>
  <span class="indicator" id="ngrok-ind"></span>
  <a id="ngrok-url" href="#" target="_blank">—</a>
</div>

<div id="timer-widget">
  <div class="tw-label">server uptime</div>
  <div class="tw-time offline" id="tw-time">--:--:--</div>
  <div class="tw-status off" id="tw-status">OFFLINE</div>
</div>

<div id="terminal" style="display:none">
  <div id="empty">// ожидание подключения...</div>
</div>

<input id="filterIp" style="display:none" value="">
<input id="filterPath" style="display:none" value="">

<script>
  const API    = 'http://localhost:8093/api';
  const LOG_URL = '/nova/visitors.log';
  const CORRECT_KEY = '1234567890';

  let adminKey      = '';
  let sinceIndex    = 0;
  let pollTimer     = null;
  let logPaused     = false;
  let uptimeTimer   = null;
  let startedAt     = null;
  let lastPid       = null;
  let justStarted   = false;
  let allEntries  = [];
  let seenIPs     = new Set();
  let isConnected = false;

  /* ── AUTH ── */
  function connect() {
    adminKey = document.getElementById('keyInput').value.trim();
    if (!adminKey) { msg('введите ключ'); return; }
    if (adminKey !== CORRECT_KEY) { msg('неверный ключ'); return; }
    msg('');
    isConnected = true;
    sinceIndex = 0; allEntries = []; seenIPs = new Set();
    startedAt = null;
    lastPid = null;
    document.getElementById('terminal').innerHTML = '<div id="empty">// подключение...</div>';
    fetchLogs(true);
    fetchStatus();
    fetchNgrok();
    if (!pollTimer) pollTimer = setInterval(tick, 10000);
    startNgrokPoller();
  }

  function tick() { fetchLogs(false); fetchStatus(); fetchNgrok(); }

  /* ── UPTIME ── */
  function startUptimeClock() {
    if (uptimeTimer) clearInterval(uptimeTimer);
    uptimeTimer = setInterval(updateUptime, 1000);
    updateUptime();
  }
  function setServerStartTime(isoString) {
    if (isoString) {
      startedAt = new Date(isoString).getTime();
    } else {
      startedAt = null;
    }
    updateUptime();
  }
  function updateUptime() {
    const el   = document.getElementById('uptime-val');
    const twT  = document.getElementById('tw-time');
    const twS  = document.getElementById('tw-status');
    if (!startedAt) {
      el.textContent  = '—';
      twT.textContent = '--:--:--';
      twT.className   = 'tw-time offline';
      twS.textContent = 'OFFLINE';
      twS.className   = 'tw-status off';
      return;
    }
    const s  = Math.floor((Date.now() - startedAt) / 1000);
    if (s < 0) return;
    const h  = Math.floor(s / 3600);
    const m  = Math.floor((s % 3600) / 60);
    const sc = s % 60;
    const str = `${pad(h)}:${pad(m)}:${pad(sc)}`;
    el.textContent  = str;
    twT.textContent = str;
    twT.className   = 'tw-time';
    twS.textContent = 'ONLINE';
    twS.className   = 'tw-status on';
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  /* ── STATUS ── */
  async function fetchStatus() {
    try {
      const res = await fetch(`${API}/status`, { headers:{ 'X-Admin-Key': adminKey } });
      if (!res.ok) return;
      const d = await res.json();
      const on = d.running;
      document.getElementById('srv-ind').className      = 'indicator ' + (on ? 'ind-on' : 'ind-off');
      document.getElementById('srv-status').textContent = on ? `online (PID ${d.pid})` : 'offline';
      document.getElementById('srv-status').style.color = on ? '#00ff41' : '#ff4444';

      // update uptime: reset if PID changed (new process = restart/start)
      if (on) {
        const pidChanged = d.pid !== lastPid;
        lastPid = d.pid;
        if (!justStarted) {
          if (d.startTime) {
            if (!startedAt || pidChanged) {
              setServerStartTime(d.startTime);
              startUptimeClock();
            }
          } else if (!startedAt || pidChanged) {
            startedAt = Date.now();
            startUptimeClock();
          }
        }
      } else {
        lastPid = null;
        setServerStartTime(null);
      }

      // buttons
      document.getElementById('btn-start').disabled   = on;
      document.getElementById('btn-restart').disabled = !on;
      document.getElementById('btn-stop').disabled    = !on;
      document.getElementById('btn-start').className   = on  ? 'btn btn-gray' : 'btn';
      document.getElementById('btn-restart').className = !on ? 'btn btn-gray' : 'btn btn-yellow';
      document.getElementById('btn-stop').className    = !on ? 'btn btn-gray' : 'btn btn-red';
    } catch {}
  }

  /* ── START / STOP / RESTART ── */
  async function serverAction(action) {
    // auto-connect if not connected
    if (!isConnected) {
      adminKey = document.getElementById('keyInput').value.trim() || localStorage.getItem('nova_ctrl_key') || '';
      if (!adminKey || adminKey !== CORRECT_KEY) { msg('введите ключ'); return; }
      msg('');
      isConnected = true;
      sinceIndex = 0; allEntries = []; seenIPs = new Set();
      startedAt = null; lastPid = null;
      document.getElementById('terminal').innerHTML = '<div id="empty">// подключение...</div>';
      fetchLogs(true); fetchNgrok();
      if (!pollTimer) pollTimer = setInterval(tick, 10000);
      startNgrokPoller();
    }

    const btnMap = { start: 'btn-start', stop: 'btn-stop', restart: 'btn-restart' };
    const btn = document.getElementById(btnMap[action]);
    if (btn) { btn.disabled = true; btn.textContent = '...'; }
    if (action === 'start' || action === 'restart') {
      justStarted = true;
      setServerStartTime(null);
      startedAt = Date.now();
      startUptimeClock();
      setTimeout(() => { justStarted = false; }, 5000);
    }
    if (action === 'stop') {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      logPaused = true;
      sysLog('Опрос логов остановлен.');
    }
    if (action === 'start' || action === 'restart') {
      logPaused = false;
    }
    const labels = { start: 'START', stop: 'STOP', restart: 'RESTART' };
    try {
      const res = await fetch(`${API}/${action}`, {
        method: 'POST',
        headers: { 'X-Admin-Key': adminKey }
      });
      const d = await res.json();
      sysLog(d.message || action, action === 'stop' && !d.running);
      setTimeout(fetchStatus, action === 'restart' ? 1200 : 300);
    } catch(e) {
      sysLog('Ошибка: ' + e.message, true);
      fetchStatus();
    } finally {
      if (btn) btn.textContent = labels[action] || action.toUpperCase();
    }
  }

  /* ── LOGS ── */
  async function fetchLogs(initial) {
    try {
      const res = await fetch(LOG_URL + '?_=' + Date.now());
      if (!res.ok && res.status !== 404) return;
      const text = res.status === 404 ? '' : await res.text();
      const lines = text.trim() ? text.trim().split('\n') : [];
      const newLines = lines.slice(sinceIndex);
      const newEntries = [];
      newLines.forEach(line => {
        try {
          const e = JSON.parse(line.trim());
          newEntries.push(e);
          allEntries.push(e);
          if (e.ip) seenIPs.add(e.ip);
        } catch {}
      });
      sinceIndex = lines.length;

      if (initial) {
        renderAll();
      } else if (newEntries.length > 0) {
        renderEntries(newEntries, false);
      }
      updateStats();
    } catch {}
  }

  function renderAll() {
    const term = document.getElementById('terminal');
    term.innerHTML = '';
    if (allEntries.length === 0) {
      term.innerHTML = '<div id="empty">// посетителей пока нет — ожидание...</div>';
      return;
    }
    renderEntries(allEntries, false);
  }

  function renderEntries(entries, clear) {
    const term = document.getElementById('terminal');
    if (clear) term.innerHTML = '';
    const fi = document.getElementById('filterIp').value.trim().toLowerCase();
    const fp = document.getElementById('filterPath').value.trim().toLowerCase();
    const filtered = entries.filter(e => {
      if (fi && !e.ip.toLowerCase().includes(fi)) return false;
      if (fp && !e.p.toLowerCase().includes(fp))  return false;
      return true;
    });
    filtered.forEach((e, i) => {
      setTimeout(() => {
        if (logPaused) return;
        const div = document.createElement('div');
        div.className = 'entry';
        const ua  = e.ua ? `<div class="e-ua" title="${esc(e.ua)}">${esc(e.ua)}</div>` : '';
        const ref = e.r  ? `<div class="e-ref">↩ ${esc(e.r)}</div>` : '';
        div.innerHTML = `
          <span class="e-time">${fmt(e.t)}</span>
          <span class="e-ip">${esc(e.ip)}</span>
          <span class="e-status ${sc(e.s)}">${e.s}</span>
          <span class="e-path">${esc(e.m)} ${esc(e.p)}${ua}${ref}</span>`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
      }, i * 600);
    });
  }

  function sysLog(text, isErr) {
    const term = document.getElementById('terminal');
    const div  = document.createElement('div');
    div.className = 'sys-msg' + (isErr ? ' err' : '');
    div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  function clearLog() {
    document.getElementById('terminal').innerHTML = '<div id="empty">// очищено — ожидание новых посетителей...</div>';
    allEntries = []; seenIPs = new Set(); updateStats();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allEntries.length;
    document.getElementById('stat-uniq').textContent  = seenIPs.size;
  }

  function msg(t) { document.getElementById('auth-msg').textContent = t; }

  function sc(s) {
    if (s===200) return 's-200'; if (s===304) return 's-304';
    if (s===404) return 's-404'; if (s===403||s===405) return 's-403';
    return 's-other';
  }
  function fmt(iso) {
    try {
      const d = new Date(iso);
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    } catch { return iso; }
  }
  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── NGROK ── */
  let currentNgrokUrl = null;
  let ngrokTimer = null;

  async function fetchNgrok() {
    try {
      const res = await fetch(`${API}/ngrok`, { headers: { 'X-Admin-Key': adminKey } });
      if (!res.ok) return;
      const d = await res.json();
      setNgrokUrl(d.url);
    } catch {}
  }

  function startNgrokPoller() {
    if (ngrokTimer) clearInterval(ngrokTimer);
    ngrokTimer = setInterval(fetchNgrok, 5000);
  }

  function setNgrokUrl(url) {
    currentNgrokUrl = url || null;
    const el = document.getElementById('ngrok-url');
    const ind = document.getElementById('ngrok-ind');
    const copyBtn = document.getElementById('ngrok-copy-btn');
    if (url) {
      el.textContent = url;
      el.href = url;
      el.className = '';
      ind.className = 'indicator ind-on';
      copyBtn.style.display = '';
    } else {
      el.textContent = 'не запущен';
      el.href = '#';
      el.className = 'offline';
      ind.className = 'indicator ind-off';
      copyBtn.style.display = 'none';
    }
    document.getElementById('btn-newip').disabled = !isConnected;
  }

  function copyNgrok() {
    if (!currentNgrokUrl) return;
    navigator.clipboard.writeText(currentNgrokUrl).then(() => {
      const btn = document.getElementById('ngrok-copy-btn');
      btn.textContent = 'OK!';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
    }).catch(() => {
      prompt('Скопируй ссылку:', currentNgrokUrl);
    });
  }

  async function newIp() {
    const btn = document.getElementById('btn-newip');
    btn.disabled = true;
    btn.textContent = '...';
    setNgrokUrl(null);
    sysLog('Получаю новый IP...');
    try {
      const res = await fetch(`${API}/ngrok/new`, {
        method: 'POST',
        headers: { 'X-Admin-Key': adminKey }
      });
      const d = await res.json();
      sysLog(d.message || 'Готово');
      setNgrokUrl(d.url);
    } catch(e) {
      sysLog('Ошибка ngrok: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'NEW IP';
    }
  }

  document.getElementById('filterIp').addEventListener('keydown',   e => { if(e.key==='Enter') renderAll(); });
  document.getElementById('filterPath').addEventListener('keydown', e => { if(e.key==='Enter') renderAll(); });
  document.getElementById('keyInput').addEventListener('keydown',   e => { if(e.key==='Enter') connect(); });

  const saved = localStorage.getItem('nova_ctrl_key');
  if (saved) document.getElementById('keyInput').value = saved;
  document.getElementById('keyInput').addEventListener('input', () => {
    localStorage.setItem('nova_ctrl_key', document.getElementById('keyInput').value);
  });
</script>
</body>
</html>
