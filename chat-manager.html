<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Chat — Менеджер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#09101d;color:#e8eaf6;display:flex;height:100vh;overflow:hidden;}
#sidebar{width:280px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;flex-shrink:0;}
#sidebar-head{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,229,255,.04);}
#sidebar-head h2{font-size:15px;color:#fff;display:flex;align-items:center;gap:8px;}
#sidebar-head .dot{width:8px;height:8px;border-radius:50%;background:#00e5ff;box-shadow:0 0 6px #00e5ff;}
#auth-gate{padding:20px;}
#auth-gate input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:10px;color:#fff;padding:9px 12px;font-size:13px;outline:none;margin-bottom:8px;}
#auth-gate button{width:100%;background:linear-gradient(135deg,#00e5ff,#7b2fff);border:none;border-radius:10px;color:#fff;padding:9px;font-size:13px;cursor:pointer;}
#sessions-list{flex:1;overflow-y:auto;padding:6px;}
.session-item{padding:12px 12px;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;gap:4px;border:1px solid transparent;transition:background .15s;}
.session-item:hover{background:rgba(255,255,255,.05);}
.session-item.active{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2);}
.session-item .sname{font-size:13px;font-weight:600;color:#fff;display:flex;justify-content:space-between;}
.session-item .sname .badge{background:#ff3b5c;color:#fff;font-size:10px;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.session-item .slast{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.session-item .stime{font-size:10px;color:rgba(255,255,255,.25);}
#main{flex:1;display:flex;flex-direction:column;}
#chat-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
#chat-head .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#00e5ff,#7b2fff);display:flex;align-items:center;justify-content:center;font-size:16px;}
#chat-head .name{font-size:14px;font-weight:600;color:#fff;}
#chat-head .sid{font-size:11px;color:rgba(255,255,255,.3);}
#messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,.2) transparent;}
.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg.visitor{align-self:flex-start;background:rgba(255,255,255,.08);color:#e8eaf6;border-bottom-left-radius:4px;}
.msg.manager{align-self:flex-end;background:linear-gradient(135deg,#00e5ff,#7b2fff);color:#fff;border-bottom-right-radius:4px;}
.msg .mtime{font-size:10px;opacity:.5;margin-top:4px;}
.msg .mlabel{font-size:10px;opacity:.6;margin-bottom:3px;}
#empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:14px;text-align:center;}
#reply-bar{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;}
#reply-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:12px;color:#fff;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;resize:none;}
#reply-input::placeholder{color:rgba(255,255,255,.3);}
#reply-btn{background:linear-gradient(135deg,#00e5ff,#7b2fff);border:none;border-radius:12px;padding:0 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
#reply-btn:hover{opacity:.85;}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-head"><h2><span class="dot"></span> Чаты с клиентами</h2></div>
  <div id="auth-gate">
    <input type="password" id="key-input" placeholder="Введите ключ администратора" autocomplete="current-password">
    <button onclick="auth()">Войти</button>
  </div>
  <div id="sessions-list" style="display:none"></div>
</div>
<div id="main">
  <div id="empty-state">← Выберите диалог</div>
  <div id="chat-area" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <div id="chat-head">
      <div class="avatar">👤</div>
      <div><div class="name" id="chat-name"></div><div class="sid" id="chat-sid"></div></div>
    </div>
    <div id="messages"></div>
    <div id="reply-bar">
      <textarea id="reply-input" rows="1" placeholder="Ответить клиенту..."></textarea>
      <button id="reply-btn">Отправить</button>
    </div>
  </div>
</div>

<script>
const BASE = '/nova/api/chat';
let adminKey = '';
let currentSession = null;
let eventSource = null;

function auth() {
  adminKey = document.getElementById('key-input').value.trim();
  if (!adminKey) return;
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('sessions-list').style.display = 'block';
  loadSessions();
  startManagerSSE();
}

document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') auth(); });

async function loadSessions() {
  const r = await fetch(`${BASE}/sessions`, { headers: { 'X-Admin-Key': adminKey, 'ngrok-skip-browser-warning': '1' } });
  if (!r.ok) { alert('Неверный ключ'); return; }
  const sessions = await r.json();
  renderSessions(sessions);
}

function renderSessions(sessions) {
  const el = document.getElementById('sessions-list');
  el.innerHTML = '';
  if (!sessions.length) { el.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,.3);font-size:13px;text-align:center">Диалогов пока нет</div>'; return; }
  sessions.forEach(s => {
    const d = document.createElement('div');
    d.className = 'session-item' + (currentSession === s.id ? ' active' : '');
    d.dataset.id = s.id;
    const last = s.lastMessage ? s.lastMessage.text.slice(0, 40) + (s.lastMessage.text.length > 40 ? '…' : '') : 'нет сообщений';
    const t = s.startedAt ? new Date(s.startedAt).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) : '';
    d.innerHTML = `<div class="sname">${s.name || 'Гость'} ${s.unread > 0 ? `<span class="badge">${s.unread}</span>` : ''}</div><div class="slast">${last}</div><div class="stime">${t}</div>`;
    d.onclick = () => openSession(s.id, s.name || 'Гость');
    el.appendChild(d);
  });
}

async function openSession(id, name) {
  currentSession = id;
  document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.getElementById('chat-name').textContent = name;
  document.getElementById('chat-sid').textContent = id;
  document.getElementById('empty-state').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';

  const r = await fetch(`${BASE}/messages?sessionId=${id}`, { headers: { 'X-Admin-Key': adminKey, 'ngrok-skip-browser-warning': '1' } });
  const data = await r.json();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  data.messages.forEach(m => appendMsg(msgs, m));
  msgs.scrollTop = msgs.scrollHeight;
  loadSessions();
}

function timeStr(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendMsg(container, msg) {
  const el = document.createElement('div');
  el.className = 'msg ' + msg.from;
  const label = msg.from === 'visitor' ? 'Клиент' : 'Менеджер';
  el.innerHTML = `<div class="mlabel">${label}</div>${msg.text}<div class="mtime">${timeStr(msg.time)}</div>`;
  container.appendChild(el);
}

function startManagerSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${BASE}/manager-stream`);
  // Can't send headers with EventSource, so we use a workaround:
  // Re-implement with fetch + ReadableStream
  eventSource.close();
  startManagerFetch();
}

async function startManagerFetch() {
  try {
    const r = await fetch(`${BASE}/manager-stream`, {
      headers: { 'X-Admin-Key': adminKey, 'ngrok-skip-browser-warning': '1' }
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const dataLine = part.split('\n').find(l => l.startsWith('data:'));
        if (!dataLine) continue;
        const payload = JSON.parse(dataLine.slice(5));
        onManagerEvent(payload);
      }
    }
  } catch {}
  setTimeout(startManagerFetch, 3000);
}

function onManagerEvent(payload) {
  loadSessions();
  if (payload.sessionId === currentSession) {
    const msgs = document.getElementById('messages');
    appendMsg(msgs, payload.msg);
    msgs.scrollTop = msgs.scrollHeight;
  }
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text || !currentSession) return;
  input.value = '';
  await fetch(`${BASE}/reply`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey, 'ngrok-skip-browser-warning': '1' },
    body: JSON.stringify({ sessionId: currentSession, text })
  });
}

document.getElementById('reply-btn').addEventListener('click', sendReply);
document.getElementById('reply-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
});
document.getElementById('reply-input').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
